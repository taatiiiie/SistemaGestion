<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña — Defensa Civil Bellavista</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--azul:#0d47a1;--texto:#1A1A2E;--muted:#6B7280;--borde:rgba(0,0,0,.10);--bg:#F4F6FA;--radio:14px}
        html,body{min-height:100%;font-family:'DM Sans',sans-serif;background:var(--bg)}
        .page-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
        .card{background:#fff;border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,.10);width:100%;max-width:420px;overflow:hidden}
        .card-top{background:linear-gradient(135deg,#0d1b6e,#0d47a1);padding:2rem 2.5rem;text-align:center;color:#fff}
        .escudo{width:52px;height:52px;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.3);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-bottom:.9rem}
        .card-top h1{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:.2rem}
        .card-top p{font-size:.82rem;opacity:.7}
        .card-body{padding:2rem 2.5rem}

        .desc{color:var(--muted);font-size:.88rem;line-height:1.6;margin-bottom:1.5rem}
        .form-group{margin-bottom:1.1rem}
        .form-group label{display:block;font-size:.83rem;font-weight:500;color:var(--texto);margin-bottom:.4rem}
        .input-wrap{position:relative}
        .input-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
        .form-group input{width:100%;padding:.75rem 1rem .75rem 2.5rem;border:1.5px solid var(--borde);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--texto);background:#fafafa;outline:none;transition:border-color .2s,box-shadow .2s}
        .form-group input:focus{border-color:var(--azul);box-shadow:0 0 0 3px rgba(13,71,161,.10);background:#fff}

        .password-strength{margin-top:.4rem}
        .ps-bar{height:4px;border-radius:2px;background:#e5e7eb;overflow:hidden;margin-bottom:.3rem}
        .ps-fill{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0}
        .ps-text{font-size:.73rem;color:var(--muted)}

        .btn-primary{width:100%;padding:.85rem;background:linear-gradient(135deg,#0d47a1,#1565c0);color:#fff;border:none;border-radius:var(--radio);font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem;margin-top:.5rem}
        .btn-primary:hover{opacity:.9}
        .btn-primary:disabled{opacity:.6;cursor:not-allowed}

        .alert{border-radius:10px;padding:.75rem 1rem;font-size:.84rem;display:none;align-items:center;gap:.5rem;margin-bottom:.9rem}
        .alert.visible{display:flex}
        .alert.error{background:#FEE2E2;border:1px solid #F87171;color:#991B1B}

        .success-view{display:none;text-align:center}
        .success-view .check{width:68px;height:68px;background:#DCFCE7;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-bottom:1rem}
        h2{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700;color:var(--texto);margin-bottom:.5rem}
        .back-link{text-align:center;margin-top:1rem;font-size:.84rem;color:var(--muted)}
        .back-link a{color:var(--azul);font-weight:500;text-decoration:none}

        .spin{animation:spin .7s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
<div class="page-wrap">
<div class="card">
    <div class="card-top">
        <div class="escudo">
            <svg width="26" height="26" viewBox="0 0 36 36" fill="none">
                <path d="M18 2L4 8v10c0 9 6.5 15.5 14 16 7.5-.5 14-7 14-16V8L18 2z" fill="#C41E3A" stroke="#ff6b6b" stroke-width="1"/>
                <path d="M18 6L7 11v8c0 6.5 4.5 11.5 11 12 6.5-.5 11-5.5 11-12v-8L18 6z" fill="rgba(255,255,255,0.9)"/>
                <text x="18" y="22" text-anchor="middle" font-family="serif" font-size="11" font-weight="bold" fill="#C41E3A">DC</text>
            </svg>
        </div>
        <h1>Nueva contraseña</h1>
        <p>Defensa Civil Bellavista</p>
    </div>
    <div class="card-body">
        <div id="formView">
            <p class="desc">Crea una nueva contraseña segura para tu cuenta.</p>

            <div class="alert error" id="alertError"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span id="errMsg"></span></div>

            <form onsubmit="doReset(event)">
                <div class="form-group">
                    <label>Nueva contraseña</label>
                    <div class="input-wrap">
                        <span class="input-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></span>
                        <input type="password" id="password" placeholder="Mín. 8 caracteres" required autocomplete="new-password" oninput="checkPwd(this)">
                    </div>
                    <div class="password-strength">
                        <div class="ps-bar"><div class="ps-fill" id="psFill"></div></div>
                        <span class="ps-text" id="psText"></span>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirmar contraseña</label>
                    <div class="input-wrap">
                        <span class="input-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></span>
                        <input type="password" id="confirm" placeholder="Repite la contraseña" required autocomplete="new-password">
                    </div>
                </div>
                <button type="submit" class="btn-primary" id="btnReset">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                    Guardar nueva contraseña
                </button>
            </form>
            <p class="back-link"><a href="login.html">← Volver al inicio de sesión</a></p>
        </div>

        <div class="success-view" id="successView">
            <div class="check"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>
            <h2>¡Contraseña actualizada!</h2>
            <p class="desc">Tu contraseña fue cambiada correctamente. Serás redirigido al inicio de sesión.</p>
        </div>
    </div>
</div>
</div>
<script src="auth.js"></script>
<script>
const token = new URLSearchParams(location.search).get('token') || '';
if (!token) {
    document.getElementById('errMsg').textContent = 'Token no encontrado. Usa el enlace del correo.';
    document.getElementById('alertError').classList.add('visible');
    document.getElementById('btnReset').disabled = true;
}

function checkPwd(inp) {
    const v = inp.value;
    const fill = document.getElementById('psFill');
    const text = document.getElementById('psText');
    let score = 0;
    if(v.length >= 8) score++;
    if(v.length >= 12) score++;
    if(/[A-Z]/.test(v)) score++;
    if(/[0-9]/.test(v)) score++;
    if(/[^a-zA-Z0-9]/.test(v)) score++;
    const colors = ['#ef4444','#f97316','#eab308','#22c55e','#16a34a'];
    const labels = ['Muy débil','Débil','Regular','Fuerte','Muy fuerte'];
    const pct    = [20,40,60,80,100];
    const i = Math.max(0, Math.min(score-1, 4));
    fill.style.width = pct[i]+'%';
    fill.style.background = colors[i];
    text.textContent = labels[i];
    text.style.color = colors[i];
}

async function doReset(e) {
    e.preventDefault();
    const btn      = document.getElementById('btnReset');
    const err      = document.getElementById('alertError');
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;

    err.classList.remove('visible');

    if (password !== confirm) {
        document.getElementById('errMsg').textContent = 'Las contraseñas no coinciden';
        err.classList.add('visible');
        return;
    }

    btn.disabled = true;
    btn.innerHTML = `<svg class="spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg> Guardando...`;

    try {
        const res  = await fetch(`${API}/api/reset-password`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({token, password}),
        });
        const data = await res.json();
        if (res.ok) {
            document.getElementById('formView').style.display    = 'none';
            document.getElementById('successView').style.display = 'block';
            setTimeout(() => window.location.href = 'login.html', 2500);
        } else {
            document.getElementById('errMsg').textContent = data.error || 'Error al restablecer';
            err.classList.add('visible');
            btn.disabled = false;
            btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Guardar nueva contraseña`;
        }
    } catch(e2) {
        document.getElementById('errMsg').textContent = 'No se pudo conectar al servidor';
        err.classList.add('visible');
        btn.disabled = false;
        btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Guardar nueva contraseña`;
    }
}
</script>
</body>
</html>
