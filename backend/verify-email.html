<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar Email — Defensa Civil Bellavista</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--azul:#0d47a1;--texto:#1A1A2E;--muted:#6B7280;--bg:#F4F6FA;--radio:14px}
        html,body{min-height:100%;font-family:'DM Sans',sans-serif;background:var(--bg)}
        .page-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
        .card{background:#fff;border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,.10);width:100%;max-width:440px;overflow:hidden}
        .card-top{background:linear-gradient(135deg,#0d1b6e,#0d47a1);padding:2rem 2.5rem;text-align:center;color:#fff}
        .escudo{width:52px;height:52px;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.3);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-bottom:.9rem}
        .card-top h1{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:.2rem}
        .card-top p{font-size:.82rem;opacity:.7}
        .card-body{padding:2rem 2.5rem;text-align:center}

        .icon-wrap{width:72px;height:72px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-bottom:1.25rem}
        .icon-wrap.loading{background:#EFF6FF}
        .icon-wrap.success{background:#DCFCE7}
        .icon-wrap.error{background:#FEE2E2}

        h2{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:700;color:var(--texto);margin-bottom:.6rem}
        .sub{color:var(--muted);font-size:.9rem;line-height:1.6;margin-bottom:1.25rem}

        .btn-primary{width:100%;padding:.85rem;background:linear-gradient(135deg,#0d47a1,#1565c0);color:#fff;border:none;border-radius:var(--radio);font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem}
        .btn-primary:hover{opacity:.9}
        .btn-primary:disabled{opacity:.6;cursor:not-allowed}
        .btn-secondary{width:100%;padding:.75rem;background:#fff;color:var(--azul);border:1.5px solid rgba(13,71,161,.3);border-radius:var(--radio);font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:500;cursor:pointer;margin-top:.75rem;text-decoration:none;display:inline-block;text-align:center}
        .btn-secondary:hover{background:#EFF6FF}

        .alert{border-radius:10px;padding:.75rem 1rem;font-size:.84rem;display:none;align-items:center;gap:.5rem;margin-bottom:.9rem;text-align:left}
        .alert.visible{display:flex}
        .alert.error{background:#FEE2E2;border:1px solid #F87171;color:#991B1B}

        .spin{animation:spin .7s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
<div class="page-wrap">
<div class="card">
    <div class="card-top">
        <div class="escudo">
            <svg width="26" height="26" viewBox="0 0 36 36" fill="none">
                <path d="M18 2L4 8v10c0 9 6.5 15.5 14 16 7.5-.5 14-7 14-16V8L18 2z" fill="#C41E3A" stroke="#ff6b6b" stroke-width="1"/>
                <path d="M18 6L7 11v8c0 6.5 4.5 11.5 11 12 6.5-.5 11-5.5 11-12v-8L18 6z" fill="rgba(255,255,255,0.9)"/>
                <text x="18" y="22" text-anchor="middle" font-family="serif" font-size="11" font-weight="bold" fill="#C41E3A">DC</text>
            </svg>
        </div>
        <h1>Verificar Email</h1>
        <p>Defensa Civil Bellavista</p>
    </div>
    <div class="card-body">

        <div class="icon-wrap loading" id="iconWrap">
            <svg class="spin" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>
        </div>

        <div class="alert error" id="alertError">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span id="errMsg"></span>
        </div>

        <h2 id="titulo">Verificando tu cuenta...</h2>
        <p class="sub" id="subtitulo">Por favor espera un momento.</p>

        <a href="login.html" class="btn-secondary" id="btnVolver" style="display:none">Volver al inicio de sesion</a>
    </div>
</div>
</div>
<script src="auth.js"></script>
<script>
const token = new URLSearchParams(location.search).get('token') || '';

if (!token) {
    setEstado('error');
    document.getElementById('titulo').textContent   = 'Enlace invalido';
    document.getElementById('subtitulo').textContent = 'No se encontro el token de verificacion. Usa el enlace del correo.';
    document.getElementById('errMsg').textContent   = 'Accede a esta pagina desde el enlace del correo.';
    document.getElementById('alertError').classList.add('visible');
    document.getElementById('btnVolver').style.display = 'block';
} else {
    verificarToken(token);
}

async function verificarToken(t) {
    try {
        const res  = await fetch(`${API}/api/verify-email`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({token: t}),
        });
        const data = await res.json();
        if (res.ok) {
            setEstado('success');
            if (data.ya_verificado) {
                document.getElementById('titulo').textContent    = '¡Cuenta ya activa!';
                document.getElementById('subtitulo').textContent = 'Tu cuenta ya estaba verificada. Redirigiendo al inicio de sesion...';
            } else {
                document.getElementById('titulo').textContent    = '¡Cuenta verificada!';
                document.getElementById('subtitulo').textContent = 'Tu cuenta esta activa. Redirigiendo al inicio de sesion...';
            }
            document.getElementById('btnVolver').style.display = 'block';
            setTimeout(() => window.location.href = 'login.html', 2000);
        } else {
            setEstado('error');
            document.getElementById('titulo').textContent    = 'Enlace no valido';
            document.getElementById('subtitulo').textContent = '';
            document.getElementById('errMsg').textContent   = data.error || 'Token invalido o expirado';
            document.getElementById('alertError').classList.add('visible');
            document.getElementById('btnVolver').style.display = 'block';
        }
    } catch(e) {
        setEstado('error');
        document.getElementById('titulo').textContent    = 'Error de conexion';
        document.getElementById('subtitulo').textContent = 'No se pudo conectar al servidor. Asegurate de que el backend este ejecutandose.';
        document.getElementById('btnVolver').style.display = 'block';
    }
}

function setEstado(tipo) {
    const wrap = document.getElementById('iconWrap');
    if (tipo === 'success') {
        wrap.className = 'icon-wrap success';
        wrap.innerHTML = `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`;
    } else if (tipo === 'error') {
        wrap.className = 'icon-wrap error';
        wrap.innerHTML = `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
    }
}
</script>
</body>
</html>
